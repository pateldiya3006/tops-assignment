<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify Playlist</title>

    <style>
        .playlist{
            display: flex;
            gap: 20px;
            align-items: center;
            background-color: #1DB954;
            padding: 20px;
        }

        .song-card{
            display: flex;
            align-items: center;
            width: 180px;
            height: 70px;
            background-color: #222;
            color: white;
            padding: 10px;
            border-radius: 8px;
        }

        .song-info{
            margin-left: 10px;
        }

        .song-info h4{
            margin: 0;
        }

        .song-info p{
            
            margin: 5px 0 0;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <h2 align="center">Spotify Playlist</h2>

    <div class="playlist">

        <div class="song-card">
            <div class="song-info">
                <h4>Chaar Kadam</h4>
                <p>Shaan</p>
            </div>
        </div>

        <div class="song-card">
            <div class="song-info">
                <h4>Enna Sona</h4>
                <p>Arijit Singh</p>
            </div>
        </div>

        <div class="song-card">
            <div class="song-info">
                <h4>Pal</h4>
                <p>Arijit Singh</p>
            </div>
        </div>

        <div class="song-card">
            <div class="song-info">
                <h4>Kesariya</h4>
                <p>Arijit Singh</p>
            </div>
        </div>

        <div class="song-card">
            <div class="song-info">
                <h4>Apna Bana Le</h4>
                <p>Arijit Singh</p>
            </div>
        </div>

    </div>

</body>
</html>
