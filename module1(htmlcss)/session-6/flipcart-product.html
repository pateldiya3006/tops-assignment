<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Page</title>

    <style>
        .box{
            padding: 20px;
            margin: 20px;
        }

        .product{
            width: 350px;
            border: 2px solid black;
            padding: 20px;
            overflow: hidden;
            margin: 50px auto;
            align-items: center;
        }

        .name{
            text-align: center;
            display: block;
            font-size: 20px;
            font-weight: bold;
        }

        img{
            display: block;
            margin: auto;
        }

        .price{
            text-align: center;
            display: block;
            color: green;
            font-size: 18px;
        }

        .hide{
            display: none;
        }
    </style>
</head>

<body>

    <div class="box">
        <div class="product">
            <img src="puma.jpg" alt="Puma" width="250" height="250">

            <div class="name">Puma Sneakers</div>

            
            <div class="price hide">₹3,999</div>

        </div>
    </div>

</body>
</html>
