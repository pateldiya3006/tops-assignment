<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>product page</title>
    <style>
        .box{
            padding: 20px;
            margin: 20px;
        }
        .product{
            width: 350px;
            border: 2px solid black;
            padding: 20px;
            overflow: hidden;
            margin: 50px auto;
            align-items: center;
        }
        .name{
            text-align: center;
            display: block;
            
        }
        img{
            display: block;
            font-size: 20px;
            margin: auto;
        }
        .price{
            text-align: center;
            display: block;
            color: green;
        }
        .hide{
            display: none;
        }
    </style>
</head>
<body>
    
    <div class="box">
    <div class="product">
        <img src="puma.jpg" alt="puma" width="250" height="250" >
        <div class="name">Puma Sneakers</div>
        <div class="price">3,999</div>
    </div>
    </div>
</body>
</html>
