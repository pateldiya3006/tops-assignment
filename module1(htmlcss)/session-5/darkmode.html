<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark-mode page</title>
    <style>
        body{
            background: white;
            color: black;
            font-family: 'Times New Roman', Times, serif;
        }
        .dark-mode{
            background: black;
            color: white;
        }
        button{
            padding: 10px;
            margin: 20px;
        }
    </style>
</head>
<body>
    <h1>Hridyam Movie</h1>
    <button onclick="darkmode()">Toggle Mode</button>
    <script>
        function darkmode(){
            document.body.classList.toggle("dark-mode");
        }
    </script>
</body>
</html>
